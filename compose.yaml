name: x278-realistic

services:
  payer-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUN_IMAGE: ${BUN_IMAGE:-oven/bun:1-alpine}
    image: backwork/x278-realistic:local
    command: ["bun", "run", "payer:http"]
    init: true
    environment:
      X278_PAYER_PORT: "8787"
    ports:
      - "${X278_PAYER_PORT:-8787}:8787"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "--eval",
          "fetch('http://127.0.0.1:8787/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
        ]
      interval: 2s
      timeout: 1s
      retries: 20
      start_period: 5s

  provider-scenario:
    image: backwork/x278-realistic:local
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUN_IMAGE: ${BUN_IMAGE:-oven/bun:1-alpine}
    command: ["bun", "run", "scenario:realistic"]
    init: true
    environment:
      X278_PAYER_URL: "http://payer-api:8787"
    depends_on:
      payer-api:
        condition: service_healthy

  hapi-fhir:
    image: ${HAPI_FHIR_IMAGE:-hapiproject/hapi:latest}
    profiles: ["fhir"]
    init: true
    ports:
      - "${HAPI_FHIR_PORT:-8090}:8080"

  provider-fhir-scenario:
    image: backwork/x278-realistic:local
    profiles: ["fhir"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUN_IMAGE: ${BUN_IMAGE:-oven/bun:1-alpine}
    command: ["bun", "run", "scenario:fhir"]
    init: true
    environment:
      X278_PAYER_URL: "http://payer-api:8787"
      FHIR_BASE_URL: "http://hapi-fhir:8080/fhir"
    depends_on:
      payer-api:
        condition: service_healthy
      hapi-fhir:
        condition: service_started
