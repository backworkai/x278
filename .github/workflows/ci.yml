name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  BUN_VERSION: 1.3.11
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Bun / TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Certification readiness
        run: bun run cert:check

      - name: Security audit
        run: bun run security:audit

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Release smoke
        run: bun run release:smoke

      - name: Package export validation
        run: bun run release:attw

      - name: Realistic Docker scenario
        run: bun run docker:realistic

      - name: HAPI FHIR validation scenario
        run: bun run docker:fhir
