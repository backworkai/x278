name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Package version to publish, without the leading v
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  BUN_VERSION: 1.3.11
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  npm:
    name: npm
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify package version
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
        run: |
          node -e "const pkg = require('./package.json'); if (pkg.version !== process.env.EXPECTED_VERSION) { throw new Error(`package.json version ${pkg.version} did not match ${process.env.EXPECTED_VERSION}`); }"

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Release smoke
        run: bun run release:smoke

      - name: Package export validation
        run: bun run release:attw

      - name: Publish
        run: npm publish --access public
